backend:
  name: git-gateway
  branch: main

# Wird über Netlify Identity + Git Gateway abgesichert — siehe LIESMICH.md
# für die einmalige Einrichtung.

media_folder: "images"
public_folder: "/images"

locale: "de"

collections:

  - name: "articles"
    label: "Artikel"
    label_singular: "Artikelliste"
    files:
      - name: "articles"
        label: "Alle Artikel"
        file: "data/articles.json"
        fields:
          - label: "Artikel"
            name: "articles"
            widget: "list"
            summary: "{{title}} — {{status}}"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Slug (für die URL, nur Kleinbuchstaben und Bindestriche)", name: "slug", widget: "string"}
              - {label: "Unterzeile", name: "dek", widget: "text"}
              - {label: "Thema", name: "tag", widget: "string"}
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - {label: "Laufend", value: "laufend"}
                  - {label: "Abgeschlossen", value: "abgeschlossen"}
              - {label: "Datum (als Text, z. B. 14. Februar 2026)", name: "date", widget: "string"}
              - {label: "Lesezeit (z. B. 9 Min. Lesezeit)", name: "readingTime", widget: "string"}
              - {label: "Teaser für die Übersichtskarte", name: "excerpt", widget: "text"}
              - {label: "Artikeltext", name: "body", widget: "markdown"}

  - name: "blog"
    label: "Live-Blog"
    label_singular: "Blog-Einträge"
    files:
      - name: "blog"
        label: "Alle Einträge"
        file: "data/blog.json"
        fields:
          - label: "Einträge (neueste zuerst)"
            name: "entries"
            widget: "list"
            summary: "{{date}} — {{title}}"
            fields:
              - {label: "Datum (als Text, z. B. 13. Juli 2026)", name: "date", widget: "string"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
